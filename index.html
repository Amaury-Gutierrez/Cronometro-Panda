<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cronómetro Panda</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;

      /* Degradado dinámico con colores de ciclo solar */
      background: linear-gradient(135deg, 
        #4fc3f7, /* 1. Día (Azul claro) */
        #ffb74d, /* 2. Atardecer (Naranja) */
        #7e57c2, /* 3. Anochecer (Púrpura) */
        #1a237e, /* 4. Noche (Azul muy oscuro) */
        #ffab91, /* 5. Amanecer (Salmón/Rosa) */
        #4fc3f7, /* 6. Día (Cierra el ciclo) */
        #ffb74d  /* 7. Atardecer (Empata con el inicio) */
      );
      
      background-size: 600% 600%;
      
      /* Animación del ciclo (40 segundos, infinito) */
      animation: degradado-dia-noche 40s linear infinite;
    }

    @keyframes degradado-dia-noche {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    .fondo-habitat {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 100vh;

      background-image: url("images/habitat.png");
      background-repeat: no-repeat;
      background-position: bottom center;
      background-size: 100% auto;

      z-index: 0;
      pointer-events: none;
    }

    #suelo-pandas {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 20vh;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }
    
    .panda-suelto {
      position: absolute;
      font-size: 75px;
      cursor: grab;
      user-select: none;
      touch-action: none;
      pointer-events: auto;
      transition: transform 0.15s;
    }
    
    .panda-suelto:active {
      cursor: grabbing;
      transform: scale(1.15);
    }

    .nombre-autor {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);

      /* Colores blanco y negro de panda con borde verde bambú */
      background-color: #ffffff;
      color: #212121;
      border: 3px solid #388e3c;
      border-radius: 18px;

      padding: 8px 22px;
      font-size: 17px;
      font-weight: bold;
      letter-spacing: 0.4px;

      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
      white-space: nowrap;
    }

    .contenedor {
      position: relative;
      z-index: 2;
      background-color: rgba(255, 255, 255, 0.95);
      border: 5px solid #2e7d32; /* Verde oscuro */
      border-radius: 30px;
      padding: 45px 50px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 520px;     
      min-height: 320px; 
      backdrop-filter: blur(2px);
      margin-bottom: 120px; /* Espacio para que el panda de abajo no tape los botones */
    }

    h1 {
      color: #1b5e20; /* Verde más oscuro para el título */
      margin-bottom: 10px;
      font-size: 50px;
    }
    
    .panda-icono {
      font-size: 100px;
      margin: 10px 0;
      animation: saltito 1s infinite alternate;
    }

    @keyframes saltito {
      from { transform: translateY(0); }
      to { transform: translateY(-10px); }
    }

    #tiempo {
      font-size: 48px;
      font-weight: bold;
      /* Fondo oscuro y texto claro emulando los colores del panda */
      color: #ffffff;
      margin: 25px 0;
      background-color: #212121;
      padding: 15px;
      border-radius: 20px;
      border: 3px dashed #4caf50;
    }
    
    .botones button {
      font-size: 18px;
      padding: 12px 18px;
      margin: 8px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    #play {
      background-color: #4caf50; /* Verde bambú */
      color: white;
    }

    #detener {
      background-color: #d32f2f; /* Rojo oscuro para contraste */
      color: white;
    }

    #reiniciar {
      background-color: #607d8b; /* Gris oscuro */
      color: white;
    }

    button:hover {
      transform: scale(1.08);
      opacity: 0.9;
    }

    /* --- Contenedor del Panda Principal e Interactivo --- */
    .contenedor-panda-central {
      position: absolute;
      bottom: -325px; /* Posicionado abajo y al centro del contenedor */
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 300px;
      z-index: 3;
    }

    .panda-principal {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Imagen del Bambú sobre la boca del panda */
    .bamboo-comida {
      position: absolute;
      top: 25%; /* Alineado aproximadamente a la altura de la boca */
      left: 35%;
      width: 120px;
      height: auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    /* Clase activa para activar la animación de masticar */
    .bamboo-comida.comiendo {
      opacity: 1;
      animation: masticar 0.4s infinite alternate;
    }

    @keyframes masticar {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(8px) rotate(5deg); }
    }
  </style>
</head>

<body>

  <div class="fondo-habitat"></div>
  <div id="suelo-pandas"></div>

  <div class="contenedor">
    <div class="nombre-autor">🐼 Katia Sánchez Hernández 🐼</div>

    <h1>Cronómetro Panda</h1>
    <div class="panda-icono">🐼</div>
    <div id="tiempo">00:00.00</div>

    <div class="botones">
      <button id="play">▶️ Play</button>
      <button id="detener">⏸️ Detener</button>
      <button id="reiniciar">🔄 Reiniciar</button>
    </div>

    <div class="contenedor-panda-central">
      <img id="panda-avatar" class="panda-principal" src="images/panda_dormido.png" alt="Panda Central">
      <img id="bamboo-avatar" class="bamboo-comida" src="images/bamboo.png" alt="Bambú">
    </div>
  </div>

<script>
  let tiempo_acumulado = 0;  
  let tiempo_inicio = null;  
  let intervalo = null;

  const limite = 15 * 60 * 1000;

  const tiempo = document.getElementById("tiempo");
  const boton_play = document.getElementById("play");
  const boton_detener = document.getElementById("detener");
  const boton_reiniciar = document.getElementById("reiniciar");

  const suelo_pandas = document.getElementById("suelo-pandas");
  const panda_avatar = document.getElementById("panda-avatar");
  const bamboo_avatar = document.getElementById("bamboo-avatar");

  const tiempo_entre_pandas = 1 * 60 * 1000;
  const velocidad_panda = 1.5;

  let pandas_array = [];
  let animacion_pandas = null;
  let pandas_activos = false;
  let siguiente_panda_ms = tiempo_entre_pandas;

  function mostrar_tiempo(ms) {
    let minutos = Math.floor(ms / 60000);
    let segundos = Math.floor((ms % 60000) / 1000);
    let milesimas = Math.floor((ms % 1000) /10);

    let minutos_texto = String(minutos).padStart(2, "0");
    let segundos_texto = String(segundos).padStart(2, "0");
    let milesimas_texto = String(milesimas).padStart(2, "0");

    tiempo.textContent = minutos_texto + ":" + segundos_texto + "." + milesimas_texto;
  }

  function generar_pandas_por_tiempo(transcurrido) {
    while (
      siguiente_panda_ms <= limite &&
      transcurrido >= siguiente_panda_ms
    ) {
      crear_panda();
      animar_comer_bamboo(); // Activa la animación del bambú cada minuto
      siguiente_panda_ms += tiempo_entre_pandas;
    }
  }

  // Función para manejar la acción de comer bambú por 5 segundos
  function animar_comer_bamboo() {
    bamboo_avatar.classList.add("comiendo");
    setTimeout(() => {
      bamboo_avatar.classList.remove("comiendo");
    }, 5000); // 5000 milisegundos = 5 segundos comiendo
  }

  function actualizar_cronometro() {
    let ahora = performance.now();
    let transcurrido = tiempo_acumulado + (ahora - tiempo_inicio);

    if (transcurrido >= limite) {
      transcurrido = limite;

      generar_pandas_por_tiempo(transcurrido);
      mostrar_tiempo(transcurrido);

      clearInterval(intervalo);
      intervalo = null;
      tiempo_acumulado = limite;

      detener_pandas();
      panda_avatar.src = "images/panda_dormido.png";
      return;
    }

    generar_pandas_por_tiempo(transcurrido);
    mostrar_tiempo(transcurrido);
  }

  function iniciar_cronometro() {
    if (intervalo === null && tiempo_acumulado < limite) {
      tiempo_inicio = performance.now();
      intervalo = setInterval(actualizar_cronometro, 10);
      iniciar_pandas();
      
      // Cambia a estado sentado (activo) al dar Play
      panda_avatar.src = "images/panda_sentado.png";
    }
  }

  function detener_cronometro() {
    if (intervalo !== null) {
      tiempo_acumulado += performance.now() - tiempo_inicio;
      clearInterval(intervalo);
      intervalo = null;
      detener_pandas();

      // Cambia a estado dormido si se pausa
      panda_avatar.src = "images/panda_dormido.png";
    }
  }

  function reiniciar_cronometro() {
    clearInterval(intervalo);
    intervalo = null;
    tiempo_acumulado = 0;
    tiempo_inicio = null;

    mostrar_tiempo(0);
    reiniciar_pandas();

    // Vuelve al estado inicial dormido
    panda_avatar.src = "images/panda_dormido.png";
    bamboo_avatar.classList.remove("comiendo");
  }

  function crear_panda() {
    const panda = document.createElement("div");
    panda.classList.add("panda-suelto");
    panda.textContent = "🐼";

    suelo_pandas.appendChild(panda);

    const size = panda.offsetWidth || 42;
    const ancho = suelo_pandas.clientWidth;
    const alto = suelo_pandas.clientHeight;

    const x = Math.random() * (ancho - size);
    const y = Math.random() * (alto - size);

    const datos = {
      elemento: panda,
      x,
      y,
      dx: (Math.random() - 0.5) * velocidad_panda * 2,
      dy: (Math.random() - 0.5) * velocidad_panda * 2,
      arrastrando: false
    };

    actualizar_posicion_panda(datos);
    activar_arrastre_panda(datos);

    pandas_array.push(datos);
  }

  function activar_arrastre_panda(datos) {
    const panda = datos.elemento;

    let offsetX = 0;
    let offsetY = 0;

    panda.addEventListener("pointerdown", (e) => {
      datos.arrastrando = true;
      const rect = panda.getBoundingClientRect();

      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;

      panda.setPointerCapture(e.pointerId);
    });

    panda.addEventListener("pointermove", (e) => {
      if (!datos.arrastrando) return;

      const rect_suelo = suelo_pandas.getBoundingClientRect();

      datos.x = e.clientX - rect_suelo.left - offsetX;
      datos.y = e.clientY - rect_suelo.top - offsetY;

      limitar_panda_al_suelo(datos);
      actualizar_posicion_panda(datos);
    });

    panda.addEventListener("pointerup", () => {
      datos.arrastrando = false;
      datos.dx = (Math.random() - 0.5) * velocidad_panda * 2;
      datos.dy = (Math.random() - 0.5) * velocidad_panda * 2;
    });

    panda.addEventListener("pointercancel", () => {
      datos.arrastrando = false;
    });
  }

  function limitar_panda_al_suelo(datos) {
    const size = datos.elemento.offsetWidth || 42;
    const ancho = suelo_pandas.clientWidth;
    const alto = suelo_pandas.clientHeight;

    datos.x = Math.max(0, Math.min(ancho - size, datos.x));
    datos.y = Math.max(0, Math.min(alto - size, datos.y));
  }

  function actualizar_posicion_panda(datos) {
    datos.elemento.style.left = datos.x + "px";
    datos.elemento.style.top = datos.y + "px";
  }

  function mover_pandas() {
    if (!pandas_activos) return;

    pandas_array.forEach(datos => {
      if (datos.arrastrando) return;

      datos.x += datos.dx;
      datos.y += datos.dy;

      const size = datos.elemento.offsetWidth || 42;
      const ancho = suelo_pandas.clientWidth;
      const alto = suelo_pandas.clientHeight;

      if (datos.x <= 0 || datos.x >= ancho - size) {
        datos.dx *= -1;
      }

      if (datos.y <= 0 || datos.y >= alto - size) {
        datos.dy *= -1;
      }

      if (Math.random() < 0.02) {
        datos.dx = (Math.random() - 0.5) * velocidad_panda * 2;
        datos.dy = (Math.random() - 0.5) * velocidad_panda * 2;
      }

      limitar_panda_al_suelo(datos);
      actualizar_posicion_panda(datos);
    });

    animacion_pandas = requestAnimationFrame(mover_pandas);
  }

  function iniciar_pandas() {
    if (pandas_activos) return;

    pandas_activos = true;
    mover_pandas();
  }

  function detener_pandas() {
    pandas_activos = false;

    cancelAnimationFrame(animacion_pandas);
    animacion_pandas = null;
  }

  function reiniciar_pandas() {
    detener_pandas();

    pandas_array.forEach(datos => {
      datos.elemento.remove();
    });

    pandas_array = [];
    siguiente_panda_ms = tiempo_entre_pandas;
  }

  boton_play.addEventListener("click", iniciar_cronometro);
  boton_detener.addEventListener("click", detener_cronometro);
  boton_reiniciar.addEventListener("click", reiniciar_cronometro);

  mostrar_tiempo(0);
</script>

</body>
</html>
